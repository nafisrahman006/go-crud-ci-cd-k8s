apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gocrudapp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nafisrahman006/go-crud-ci-cd-k8s.git
    targetRevision: main
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true