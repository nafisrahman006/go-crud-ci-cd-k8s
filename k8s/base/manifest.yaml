apiVersion: v1
kind: ServiceAccount
metadata:
  name: go-crud-app-sa
  namespace: default

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "go-crud-app"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/go-crud-app"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/go-crud-app" -}}
          export POSTGRES_USER="{{ .Data.data.POSTGRES_USER }}"
          export POSTGRES_PASSWORD="{{ .Data.data.POSTGRES_PASSWORD }}"
          export POSTGRES_DB="{{ .Data.data.POSTGRES_DB }}"
          {{- end }}
    spec:
      serviceAccountName: go-crud-app-sa
      containers:
      - name: postgres
        image: postgres:12
        command: ["/bin/sh", "-c"]
        args:
          - |
            . /vault/secrets/config
            docker-entrypoint.sh postgres
        ports:
        - containerPort: 5432
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgres-data
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-crud-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-crud-app
  template:
    metadata:
      labels:
        app: go-crud-app
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "go-crud-app"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/go-crud-app"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/go-crud-app" -}}
          export POSTGRES_USER="{{ .Data.data.POSTGRES_USER }}"
          export POSTGRES_PASSWORD="{{ .Data.data.POSTGRES_PASSWORD }}"
          export POSTGRES_DB="{{ .Data.data.POSTGRES_DB }}"
          export DATABASE_URL="postgres://{{ .Data.data.POSTGRES_USER }}:{{ .Data.data.POSTGRES_PASSWORD }}@postgres-service:5432/{{ .Data.data.POSTGRES_DB }}?sslmode=disable"
          {{- end }}
    spec:
      serviceAccountName: go-crud-app-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
      - name: wait-for-postgres
        image: busybox
        command: ['sh', '-c',
          'until nc -z postgres-service 5432;
           do echo "waiting for postgres..."; sleep 3; done;
           echo "postgres ready!"']
      containers:
      - name: app
        image: nfsr/gocrudapp:v3
        command: ["/bin/sh", "-c"]
        args:
          - . /vault/secrets/config && ./api
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: go-crud-service
spec:
  type: NodePort
  selector:
    app: go-crud-app
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30080
